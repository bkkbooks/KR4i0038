body:
  text: 娯書堂詩話詩文評類提要臣等謹案娯書堂詩話一巻宋趙與虤撰虤字集韻音牛閑切説文訓為虎怒故其字為威伯以宋史宗室表連名次第攷之蓋太祖十世孫也書中多稱陸游楊萬里樓鑰晚年之作又引張淏雲谷雜記是寧宗以俊人矣觀其所論大抵以神韻脱灑為宗其引楊萬里千巖摘稿序及姜堯章白石詩稿自序頗以江西宗派為未善其宗㫖可知殆當宋元之交詩派將變之時學者方厭棄黄陳餘唾而欲矯以清新故其議論如此雖未必盡合詩家正諦而一時風㑹升降之故要即可於此覘之至其他徵引亦多詳核可據頗有足資攷證者焉乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:aaf80818903e69beb6048a9cbc245a44a85f2db68ddd08826cb6bf83429bc078
