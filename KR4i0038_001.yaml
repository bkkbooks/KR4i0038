body:
  text: 娛書堂詩話宋趙與虤撰唐許渾題孫處士居云髙歌懐地肺逺賦憶天台極為的對真誥云金陵者洞虚之膏腴句曲之地肺注云其地肥故曰膏腴水至則浮故曰地肺也古樂府云愛惜加窮袴防閑托守宮冷齋夜話云窮袴漢時話今襠袴也然未詳所出按西漢上官后傳宮人使令皆為窮袴多其帶服䖍曰窮袴有前後襠不得交通也師古曰即今之緄襠袴也蘇才翁舜元仕為轉運使皇祐辛夘按部至海昌安國寺藏院留一詩于壁曰華堂三月初三日絮撲紗窓燕拂簷蓮子數盃甞淡酒柘枝一曲試春衫階臨池面勝看鏡屋映花叢當下簾誰倚南樓指新月玉鈎素手兩纎纎書法遒勁有懐素體今刻于石冷齋夜話稱文與可詩精絶鷺鷥云頸細銀鈎淺曲脚髙緑玉深翹岸上水禽無數有誰似爾風標予閱與可詩復有云避雨竹間㸃㸃迎風栁下翩翩靜依寒蓼如畫獨立晴沙可憐造語尤清新可愛虞翻傳翻放棄南方自恨淪沒毎謂生無可樂死以青蠅為弔客故靈澈謫汀州詩云青蠅為弔客黄耳寄家書黄亞夫庶怪石絶句云山鬼水怪著薜荔天禄辟邪眠莓苔鈎簾坐對心語口曾見漢唐池館來天禄辟邪獸名漢西域傳烏弋有桃拔孟康曰似鹿長尾一角者或為天禄兩角者或為辟邪李西臺直宿早朝二詩其一曰春風夜急銅龍漏淡月半斜金井欄已覺亞枝花露重宿鶯猶睡怯餘寒其二云著衣香重海棠風人在瀛洲御苑東將對赤墀班未定井幹樓角日先紅呂居仁跋云觀西臺詩想見國初太平氣象不逺餘風遺烈足以悚動後世約想貞觀初難與數子階吾與諸公亦云山谷自黔中還荆南見一女子竒美因賦水仙花以寓意山谷下世女子貧不能給其夫鬻於田氏一日召髙子勉飲妾出侑觴子勉請以詩中國香字名之因作長篇紀其事有云却把水仙花說似猛省西家黄學士乃能知妾妾當時悔不書空作黄字毎誦至此未達其㫖因閱唐李賀唐兒歌東家嬌娘求對值濃笑書空作唐字之句方悟子勉之意郭功甫甞與王荆公登金陵鳳凰臺追次李太白韻援筆立成一座盡傾白句人能誦之郭詩罕有紀者今俱紀之太白云鳳凰臺上鳳凰遊鳳去臺空江自流吳宮花草埋幽徑晉代衣冠成古丘三山半落青天外二水中分白鷺洲揔為浮雲能蔽日長安不見使人愁功甫云髙臺不見鳳凰遊浩浩長江入海流舞罷青娥同去國戰殘白骨尚盈丘風揺落日吹行棹潮湧新沙換故洲結綺臨春無處覔年年芳草向人愁陸放翁云先少師宣和初有贈晁以道詩云奴愛才如蕭穎士婢知詩似鄭康成晁公大愛賞二事所出漫記于此世說鄭𤣥使一婢忤意將撻之方為陳說𤣥曳之泥中一婢來曰胡為乎泥中答曰薄言往愬逢彼之怒摭言蕭穎士有僕事之十餘年穎士捶楚嚴酷人或激之擇木僕曰非不能他去愛其才耳東坡謂晨飲為澆書黄門謂午睡為攤飯陸務觀甞有絶句云澆書滿挹浮蛆甕攤飯横眠夢蝶牀莫笑山翁見機晚也勝朝市一生忙鷓鴣其聲格磔可聽世俗想像其音或云懊惱澤家或云行不得哥哥葢方言不同而歌詠亦各用之韋莊詠鷓鴣詩云南禽無侶似相依錦翅雙雙傍馬飛孤竹廟前啼暮雨汨羅祠畔弔斜暉秦人只解歌為曲越女空能畫作衣懊惱澤家空有恨年年甞憶鳳城歸山谷詠李居馴鷓鴣云真人夢出大槐宮萬里蒼梧一洗空終日憂兄行不得鷓鴣應是庳亭公韋用前語黄用後語羅隠嚴陵灘詩范文正釣臺詩皆押髙字范詩特髙妙至用雲臺事尤非隠所及羅云中都九鼎勒英髦漁釣牛蓑且遁逃世祖昇遐夫子死原陵不及釣臺髙范云漢包六合網英髦一箇㝠鴻惜羽毛世祖功臣三十六雲臺爭似釣臺髙二詩優劣可見曾㕘預從龍赴省時館於衢州之順溪題一絶云紅照西沈暫解鞍偶然假館豈求安新豐獨酌誰為侶坐對窓前竹一竿識者已韙之矣是年竟至大魁致身政府至今其館匾為狀元四明髙端叔博學能詩鄉里推重甞有雨詩一聨云洒窓蠶食葉入竹蠏行沙人稱其工又有對云人間桂子月中種水底梅花堤上枝坎壈不仕樓攻媿挽之云弟子皆藍綬先生竟白袍毛國英澤民之仲子也以詩自鳴甞經岳侯駐兵之地江禁方嚴國英投詩云鎖鐵沈沈截碧江風旗獵獵駐危檣禹門縱使髙千尺放過蛟龍也不妨侯曰詩人也委舟以渡之僧志南能詩朱文公甞跋其巻云南詩清麗有餘格律閒暇無蔬笋氣如云沾衣欲濕杏花雨吹面不寒楊栁風每深愛之唐制有寃者哭昭陵下故李洞䇿夜簾前獻詩曰公道此時如不得昭陵痛哭一生休陸務觀亦有句云積忿有時歌易水孤忠無路哭昭陵羅隠繡詩云花隨玉指添春色鳥逐金鍼長羽毛趙彦若翦綵花詩云花隨紅意發葉就緑情新鑄意俱竒皆警句也白樂天獻裴晉公詩云聞說風情筋力在只如初破蔡州時王禹玉上文潞公詩云功業特髙嘉祐末精神如破貝州時櫽括樂天語也胡忠簡公以言事忤賊檜謫嶺外士大夫畏罪莫敢與談獨瀘溪王庭珪以詩送之其一云囊封初上九重闗是日清都虎豹閒百辟動容觀奏牘幾人回首媿朝班名髙北斗星辰上身墮南州瘴海間豈待他年公議出漢庭行召賈生還其二云大厦元非一木支欲將獨力拄傾危癡兒不了公家事男子要為天下竒當日奸諛皆胆落平生忠義只心知端能飽吃新州飯在處江山足䕶持為邑人歐陽安永告訐竄辰州檜斃始召還唐任濤髙安人詩名早著有露團沙鶴起人卧釣船流之句李常侍隲亷察江西特與放里役胡文恭公子宗炎善為詩有句云飛禽避軒葢殘果落莓苔歐公賞之周晞稷承勲有詩名曽為瑞州新昌尉題度門院詩云纔入度門寺先觀覺範詩昔人吟不盡今日到方知地僻寒來早山髙月上遲池邊老脩竹曾映董生幃葢龔龍圖端書堂在焉宿玉龍宮云夜爇松脂火朝焚栢子香舉家來萬夀佳節遇重陽雨止雲穿日風髙天欲霜吾廬籬下菊應怪未還鄉舊傳一貧士死見隂吏為言當再生汝有三百甕虀禄未盡陸放翁病愈絶句云鏡中無復舊朱顔一笑衰翁尚爾頑三百甕虀消未盡不知更著幾年還戲用此事昔有沙門遊永嘉雁蕩欲賦未就遇負薪老人倚杖而嘆問曰何嘆曰一生看不足遂得句云四海名山曽在目就中此境難圖録岩前撞見白頭翁自道一生看不足洪州大智禪寺百丈山髙可千尺為大叢林唐宣宗甞以詩題云大雄真跡枕危巒梵宇層樓峻萬般日月每從肩上過山河長在掌中看仙峯不間三春秀靈鏡無時六月寒更有上方人罕到暮鐘朝磬碧雲端不獨為此山絶唱而帝王意度於此可見楊誠齋序千岩摘藁云余甞論近世之詩人若范石湖之清新尤梁溪之平淡陸放翁之敷腴蕭千岩之工緻皆余之所畏者姜白石詩藁自序云尤延之先生為余言近世士人喜宗江西温潤有如范至能者乎痛快有如楊廷秀者乎髙古如蕭東夫俊逸如陸務觀是皆自出機杼亶有可觀者又奚以江西為哉觀二公推許想見當時騷雅之盛建安大厯風斯在下王武臣度豫章新建人吟詩有警句如雲生坐來石風掩讀殘書危紅賖晚景漲緑上平沙鴉分供餘食鴿亂著殘棋樵斧和雲砍漁蓑帶雪披皆新竒可誦張紫薇謝艮齋極口稱賞康伯可與之紹興間過清江遊慧力寺題二詩于松風亭其一云天涯芳草盡緑路旁栁絮爭飛啼鳥一聲春晚落花滿地人歸其二云江上濃隂曉未開痩筇支我上蒼苔春寒前日去已盡今日又從何處來王荆公初夏絶句云石梁茅屋有彎﨑流水濺濺度兩陂晴日煖風生麥氣緑隂幽草勝花時石湖范公云甞蒙恩獨引賜宴夀皇於行苑中親誦後二句以為佳姜堯章䕫居苕溪與白石洞天為隣潘轉菴字之曰白石道人且畀之以詩曰人間官爵似摴蒱采到枯松亦大夫白石道人新拜號斷無繳駁任稱呼堯章報以長句其詞云南山仙人何所食夜夜山中煮白石老人喚作白石仙一生費齒不費錢仙人食罷腹便便七十二峯生肺肝真祖只在南山南我欲從之不憚逺無方煮石何由軟佳名錫我何敢辭但愁自此長苦饑囊中只有轉菴詩更當掬手三嚥之李莊簡公光詩清絶可愛越中雙雁道中一絶云晚潮落盡水涓涓栁老秧齊過禁煙十里人家雞犬靜竹扉斜掩䕶蠶眠後在政府與賊檜議論不合為中司所擊送藤州安置差察院使臣伴送公戲之云日日孤村對落暉瘴煙深處忍分離追攀重見蔡明逺贖罪難逢郭子儀南渡毎憂鳶共墮北轅應許雁相隨馬蹄慣踏闗山路他日重來又送誰亦婉而有深意韓子蒼題淵明採菊圖詩云九日東籬採落英白衣遥見眼能明向令自有杯中物一段風流可得成曽文清公訪戴圖詩云小艇初從本不期剡中雪月共明時不因興盡回船去那得山隂一段竒兩詩意同均為佳作曽文清謝路憲送蠏詩從來嘆賞内黄侯風味尊前第一流只合蹣跚赴湯鼎不須辛苦上糟丘内黄侯三字甚新梅聖俞因劉原甫戲言之䜟竟終於都官葬在宮城俗呼為梅夫子墓弔之者有句云贏得兒童呌夫子可憐名位只都官太宗命蘇易簡講文中子有楊素遺子食經羮藜含糗之說上因問食品何物最珍對曰食無定味適口者珍臣止知虀汁為美臣憶一夕寒甚擁爐痛飲夜半吻燥中庭月明殘雪中覆一虀盎引缶連沃臣此時自謂上界仙厨鸞脯鳳腊殆恐不及屢欲作氷壺先生傳紀之而未暇也上笑而然之陳簡齋食虀詩曰氷壺先生當立傳木奴魚婢何足録陸務觀亦云髯鬚主簿方用事氷壺先生來解圍魚婢事出古今注江東謂青魚為婢髙皇棄天下金人來為弔祭禮丞相京公鏜以檢正假儀曹長充使報謝至近境聞燕以樂公以遏音辭且曰若不徹樂有死無二論辯數十金人為屈留汴候命有詩云鼎湖龍馭去無蹤三遣行人意則同凶禮强更為吉禮北風終未似南風設令耳與笙鏞末祇願身糜鼎鑊中已辦滯留期得請不辭築館跡江東既旋夀皇有執禮可嘉之褒除權工部侍郎孫君孚升云昔與杜挺之梅聖俞遡汴同舟見聖俞吟詩日成一篇衆莫能和因密伺聖俞如何作詩葢寢食遊觀未甞不吟詠思索也時時於座上忽引出奮筆書一小紙内算袋中同舟竊取而觀皆詩句也或半聨或一句有可用者入之有云作詩無古今惟造平淡難乃算袋中所書也康與之在髙宗朝以詩章應制與左璫狎適睿思殿有徽祖御畫特為卓絶上時持玩以起羮牆之悲璫下直竊攜至家而康適來留之飲因出示之康紿璫入取餚核輒書一絶于上曰玉輦宸遊事巳空尚遺奎藻繪春風年年花鳥無窮恨盡在蒼梧夕照中璫見之大駭無可奈何明日伺間叩頭請死上聞大怒亟取視之天威頓霽但一慟而巳力通青海求龍種死諱文成食馬肝此楊文公詠武帝詩漢書武帝既誅文成惜其方不盡膠東欒大與文成同師因樂成侯求見帝恱大曰臣恐效文成則方士皆掩口烏敢言方哉上曰文成食馬肝死耳按洞𡨕記云元鼎五年郅支國貢馬肝石半青半黑如馬肝舂以和九轉之丹丹成髮白者皆黑帝坐羣臣於甘泉有白髮者試拭皆黑酷烈不雜丹砂不可近髮齊人李少翁以神仙惑帝帝乃以馬肝石和九轉神明丹賜之少翁死即文成也今人見景帝有食肉不食馬肝未為不知味之語遂謂文成食馬之肝而死非也歐陽文忠公詩山浦轉帆迷向背夜江看斗辨東西東坡亦云山水照人迷向背只尋孤塔認西東身遊山水間果有兹理二公善於形容矣王文康公曙字晦叔甞宰定海縣賦回峯院詩云山勢欲壓海禪扃向此開魚龍腥不到日月影先來栁色秋擎出鐘聲浪荅回何期隨吏役暫得拂塵埃商逸卿得遺墨刻之王元之清明絶句云無花無酒過清明興味蕭然似野僧昨日鄰家乞新火曉窓分與讀書燈李方叔曰千株宻樹出嚴闉走馬天街賜近臣我亦茅簷自鑽燧煨針燒艾檢銅人二詩善述冷淡況味漫筆之荆公繰成白雪桑重緑割盡黄雲稻正青之句古今傳誦宗人紫芝送謝耘遊淮詩有云柘空淮繭白梅近楚秧青葢模倣此周益公休致白石黄景說賀以古風云相公能辭一品官不能辭他九轉丹相公能却萬鍾粟不能却他長生籙潭潭之府移氣體新年七十兒童佀朝朝見客步如飛窓下時時看細字髙車得似垂車榮峩冠何如掛冠清深衣獨樂真天人誰其友之聃與彭環溪吳沈觀穫詩有云新月輝輝動黄雲漸漸收形容甚工芝田録云鑰必以魚者取其不瞑目守夜之義王荆公詩曰開厨發篋鳴鎖魚山谷詩曰時送一鴟開鎖魚南史齊髙帝賜明僧紹竹根如意笋籜冠隠者榮之唐李泌隠衡山甞取松樛枝以搔背名曰養和陸放翁詩云夭矯竹如意鱗皴松養和台州巾山僧任處士翻有詩曰絶頂新秋生夜涼鶴飛松露滴衣裳前峯月照半江白僧在翠微開竹房翠微一作水湄孟子言舜封象於有庳今道永之間有鼻亭葢字訛也正在瀟水之上舟楫往來其下客有題詩云如今不是當時傲日日江頭送客舟陸龜蒙詩云他年欲事先生去十賚須加陸逸沖注逸沖甞事陶隠居錫名栖靜處士十賚猶人間九錫也秦少游游仙詞一絶亦用此事詞云本是廬山種杏人出山來事碧虚君上清欲問因何到請看仙家十賚文僧島雲過盱江題麻姑山絶句云萬叠峯巒入太清麻姑曽此㑹方平一從宴罷歸何處寳殿瓊臺空月明一先作自後於同輩舉似同輩云詩則清矣自字未穏當作一字雲服其言暨再入山巳為人改作一從矣亦可謂之一字師明妃曲古今作者多矣近時徐思叔得之所賦一篇亦為時人膾炙其詞云妾生豈願為胡婦失信寧當累明主已傷畫史忍欺君莫使君王更欺虜琵琶却解將心語一曲纔終恨何數朦朧胡霧染宮花淚眼横波時自雨専房莫倚黄金賂多少専房棄如土寧從别去得深顰一步思君一回顧胡山不隔思歸路只把琵琶寫辛苦君不見有言不食古髙辛生女無嫌嫁槃瓠髙辛事出後漢書柴與之中行嘉定間仕於朝與時宰議論不合出守章貢危逢吉稹以詩送云力與君王乞得州補天未了石還收人才自繫國輕重吾道亦關公去留殿角纔辭槐影日船頭便轉荻花秋競誇祖帳都門外誰識眉攢杜甫愁裘元量萬頃豫章人性恬退不樂仕以薦者召為司直在朝甞賦歸興云新築書堂壁未乾馬蹄催我上長安兒時祇道為官好老去方知行路難千里關山千里念一番風雨一番寒何如靜坐茅齋下翠竹蒼梧仔細看遂乞歸嚴子陵釣臺題詠尚矣天台戴適之復古一絶云萬事無心一竹竿三公不換此江山平生誤識劉文叔惹起虚名滿世間亦新竒可喜唐劉言史觀繩伎一篇末聨云坐中還有沾巾者曽見先皇初教時葢謂𤣥宗遺樂近時髙九萬賦觀思陵御製墨本絶句正用此意詩云淡黄越紙打殘碑盡是先皇御製詩白髮内人和淚看為曽親見寫詩時麻姑山瀑布泉兩𣲖而下灌溉甚溥豐城孫南叟伯温為南城簿甞遊賦古風云天關守不嚴失却兩玉龍塵世著不得忽來此山中雷霆白晝間冰雪詩人胸天公不汝尤為人作年豐甚有江西體製道士黄居萬瀑布一絶云龍梭織處人難見地軸輸來尺莫量定是水仙工性巧逐時裁去補滄浪亦有形容之工予曽伯祖伯琳官止右選平生喜為詩甞賦五月菊云為嫌陶令醉來伴屈原醒之句時人為之傳誦頃傳龜峯絶句不知誰氏所作亦有思致詩云大禹胼胝決九州百川無復恣横流介蟲不覺洪波落賺在髙峯頂上頭慶元間韓侂胄用事貶趙忠定公於永州舟次衡陽泊古鄠一夕而死敖器之陶孫時處士庠以詩哭之曰左手旋乾右轉坤羣公相扇動流言狼胡無地歸姬旦魚腹終天痛屈原一死固知公所欠孤忠賴有史甞存九原若遇韓忠獻休說渠家末代孫客有誦禽言二詩句意俱工惜忘其姓名子規云剛道故鄉如許好其如遊子不歸何自從五栁先生死空染千山血淚多著新脫故云蠶繭方成四月初鳥能早計巧相呼誰知機杼聲纔息巳有王官來索租廬陵歐陽伯威鈇少與周益公同場屋連戰不利遂篤意於詩誠齋甞摘其警句抄之如西風五更雨南雁數行書詩成䕫子國人在仲宣樓細雨雙飛鷺寒蓑獨釣船夢回千里外燈轉一窓深誰知花過半方與酒相尋故人驚㑹面新恨說從頭天上張公子雲間陸士龍月白𤣥猿哭更殘絡緯悲語離遽如許話舊復何時巷南巷北人招飲一雨一晴花奈看有客過門湖海士隔籬呼酒咄嗟間夢回金馬玉堂上文在氷甌雪碗中青山如故情非故芳草喚愁詩遣愁擾擾征人相顧語蕭蕭落木不勝秋風色似傳花信到夕陽微放栁梢晴千里歸來人事改十年猶幸此身存絶句四首戀樹殘紅濕不飛楊花雪落水生衣年來百念成灰冷無語送春春自歸桑麻得雨更青葱芍藥留春結晚紅怪得鳥聲如許好此身還在亂山中為憐桃杏亞枝斜看到斜陽送亂鴉又是一春窮不死天教留眼看鶯花蓬窓卧聽疎疎雨却似芭蕉夜半聲煙浪蔽天天倚葢略容一㸃白鷗明公跋云鳥啼花落欣然㑹心處酌大白嚥伯威詩欲馭風騎氣也昔人題瑞州飛霞山有句云野猿來往嘯明月山鳥兩三啼曉風誠齋甞稱之王從周鎬吉之永豐人仕至忠州太守喜為詩亦有警句早行云髮爽帶風梳齒疎和月潄觀僑寓樓云避喧那厭雨宜睡不思茶將雨云雲學催詩黑風仍作頌清望岳云未知真是岳祇見半為雲望仙樓云只言弱水蓬萊逺無奈仙風道骨何夀趙倅云仁心廣大麟難比夀骨清竒鶴不如紹師覔詩云凍雪寒梅雙蠟屐澄江明月一竿絲送潘文叔云催租更擾潘邠老付麥誰憐石曼卿出舂陵云山色兩間供步障松隂半畝當郵亭上何尚書云籍通上界神仙府身現甘泉侍從臣移竹後雨絶句云洗紅窣窣烏蓲雨落葉颼颼皂角風掛起北牎聊問訊新移來竹定醒鬆陶𢎞景隠居華山梁髙祖問曰山中何所有𢎞景以詩答曰山中何所有嶺上多白雲祇能自怡恱不堪持寄君陳簡齋甞倣之曰石爐深炷火撩亂一榻書只可自怡恱不堪寄張扶列仙傳費長房遇壺公有神術能縮地脈千里聚在目前放之如初岑參詩云帝鄉北近日瀘口南連蠻何當遇長房縮地到京關又云惟求縮却地鄉路莫教賖王建詩云安得縮地經忽使我在旁葢取諸此元城劉忠定公詠八月十四夜月云萬古照臨終忌滿一輪明徹豈須圓雙栢云同志不渝均管鮑清風特立若夷齊撲滿子云多求惟恐心難滿撲破方知器易盈皆寓風厲可警學者又寓興云一紀光隂若擲梭忍將得喪累天和聖賢自古成功少忠信從來獲罪多孟子寧尤臧氏沮匡人其奈仲尼何賈生年少非知道猶更為文弔汨羅尤為忠厚氣象漫叟云詹存中黙禱雨詩云下寮竊有隨車喜遥見枝頭少女風陸農師稱之管輅别傳曰輅過清河太守時天旱輅曰今夕當雨樹中已有少女微風又有隂鳥和鳴又少男風起衆鳥亂翔其應至矣須㬰風雲聿興𤣥氣四合大雨注傾梁劉孝威詩云電舒長男氣枝揺少女風所對尤的髙疎寮云易曰艮三索而得男故謂之少男兊三索而得女故謂之少女誠齋序順菴劉良佐詩藁云夫詩何為者也曰尚其詞而已矣曰善詩者去詞然則尚其意而已矣曰善詩者去意然則去詞去意則詩安在乎曰去詞去意而詩有在矣然則詩果焉在曰甞食夫飴與茶乎人孰不飴嗜也初而甘卒而酸至於茶也人病其苦也然苦未既而不勝其甘詩亦如是而已矣昔者暴公譛蘇公而蘇公刺之之詞亦不見刺之之意也乃曰二人從行誰為此禍使暴公聞之未甞指我也然非我其誰哉外不敢怒而其中愧死矣三百篇之後此味絶矣惟晚唐諸子善近之寄邊衣云寄到玉關應萬里戍人猶在玉關西弔戰場云可憐無定河邊骨猶是春閨夢裏人折楊栁云羌笛何須怨楊栁春風不度玉門關三百篇之遺味黯然猶存世惟半山老人得之予不足以知之予敢言之哉云云先生此序深造作詩之宗㫖故録之劉良佐應時四明人平生用力為詩見稱於石湖范相誠齋亦喜其寂寞黄昏愁弔影虚牎怕上短檠燈睡魔正與詩魔戰窓外一聲婆餅焦之句陸放翁跋其集云如頗識造物意長容我輩閒日晏猶更眠犬鳴知有人世事不復問舊書時一看一夜催花雨數家臨水村青山空解供眼界濁酒不能澆别愁覔句忍饑貧亦樂抄書得趣老何傷雖前輩以詩鳴何以加焉杜牧之云千首詩輕萬戸侯鄭谷云得句勝如得好官命意甚竒東坡云萬戸終輕千首詩反杜意也陳簡齋亦用鄭語云書生得句勝得官錢文僖無題詩云春痩已寛連理帶夜長惟有辟寒金按王子年拾遺記魏明帝時昆明國貢𠻳金鳥甞吐金屑如粟鳥性畏寒處之小屋水精為戸内外通光名辟寒臺宮人以鳥吐金飾釵謂之辟寒金余謂辟字當作畏避之辟音去聲若作辟除之義音入聲讀之則非葢金以畏寒得名不能禦寒也文僖詩義誤作入聲用矣更俟識者訂正守法度曰詩載始末曰引體如行書曰行放情曰歌兼之曰歌行悲如蛩螿曰吟通乎俚俗曰謡委曲盡情曰曲此姜堯章語於詩說見之梅和勝執禮未第時家極貧雪中以詩謁邑宰云有令可干閒閉戸無人堪訪懶移舟近世劉改之過詠雪詩云功名有分平吳易貧賤無交訪戴難句法相似徐文淵送趙天樂赴髙安幕詩云溪來城下緑山到市邊平翁靈舒送髙安張録事詩曰山上仙蹤丹鼎在郭邊溪色市橋分二詩可謂善狀髙安之景漫録之海棠丰韻嫣然於衆卉間騷人墨客吟詠尚矣至僧慧法之叔彭淵材乃以無香為恨世人未以為然陸放翁絶句云蜀地名花擅古今一枝氣可壓千林譏彈更到無香處甞恨人言太刻深葢為海棠解嘲亦有深意陸放翁云參寥詩初程莫早發且宿霸橋頭語意至工故公宿北岩院云車馬紛紛送入朝北岩燈火夜無聊中年到處難為别也是初程宿霸橋唐人汴河云煬帝功成只此河至今千里賴通波若無錦纜龍舟事共禹論功不較多此詩兼具美刺之體周益公兄乗成居士周子中生於乙已葢益公丙午誠齋辛夘郡人劉訥敏叔寫為三老圖益公題詩云同辭宦路返鄉閭兩驌驦中間以駑前後顧瞻羞倚玉支干引從偶連珠三人不必邀明月九老何妨續畫圖從漢二疏唐尹後相親相近此應無誠齋題二絶云旦奭行間賀季真黄冠不合附青雲二南風雅君知否添個逶迤退食人劉郎寫照妙通神三老圖成又一新只道老韓同傳好被人指㸃也愁人益公形容甚工誠齋謙遜自處真一時盛事云陸象山少時作云從來胆大胸膈寛虎豹億萬虬龍千從頭收拾一口吞有時此輩未妥貼哮吼大嚼無毫全朝飲渤海水莫宿崑崙顛連山以為琴長河以為絃萬里不傳音吾當為君宣豫章鄒應可定有詩名誠齋誌其墓云其詩曰法自徐師川上遡黄魯直以趨少陵戸牖甞過杜工部祠賦云疇昔哦詩憶耒陽兹因奉檄過祠堂一生忠義孤吟裡千載凄涼古道旁自是風霜欺病骨非干牛酒涴詩腸明朝解纜秋江上問訊先生一瓣香次韻友人廬山云十年馬足謾間關脚底廬山未往還憑誰說與陶夫子山不負予予負山雲谷雜記云前輩詠夷齊多矣獨石延年有一聨云恥生湯武干戈日寧死唐虞揖讓區葢夷齊在孟津諫伐紂而死於首陽首陽在河中永樂縣河中即古蒲坂舜之所都也廬陵劉叔儗仙倫詩才豪甚葢傷太露有題岳陽樓一篇為人傳誦詩云八月書空雁字聨岳陽樓上俯晴川水聲軒帝鈞天樂山色玉皇香案煙大舶駕風來島外孤雲銜日落吟邊東南無此登臨地遣我飄飄意欲仙魏仲先野詩沖淡閒逸警句前輩稱之甚多上陳使君云憂民如有病見客似無官形容甚切余喜誦之呂紫薇詩話云饒徳操初見潘邠老和黄山谷中興碑詩讀至天下寧知再有唐皇帝紫袍迎上皇嘆曰潘十後來做詩直至此地位耶余閱潘詩全篇誠可亞山谷所作詩云公泛浯溪春水船繫帆啼鳥春崖邊次山作頌今幾年當時治亂春風前明皇聦明真脫謬乾坤付與奴哥手骨月何傷九廟焚蜀山騎驢不回首天下寧知再有唐皇帝紫袍迎上皇神器倉忙吾敢惜兒不終孝聽五郎父子幾何不豺虎君王寧能責胡虜南内凄涼誰得知人間稱家作端午平生不識顔真卿去年不答髙將軍老來讀碑淚横臆公詩與碑當共行不賞邊功寧有許不殺奉春猶敢語雨淋日炙字未訛千秋萬嵗所鑒多語意頗壯杜牧之詩云雞犬圖書共一船冦國寳有人語雞聲共一丘之句葢用此法李㕘預璧云使燕時伴使李著能誦荆公草頭蛺蝶黄花晚菱角蜻蜓翠蔓青以為妙此乃荆公斜徑絶句後聨形狀景物語意精工金使亦可謂知詩者矣唐人中秋月詩劉得仁云一年唯一夕甞恐有雲生張祜云一年逢好夜萬里見明時司空圖云此夜若無月一年空過秋俱用一年字本朝王黄州云莫辭終夕看動是隔年期用隔年字意味尤長非三子可及徐師川偶成云茅茨雅稱疎籬見宻竹仍於碧水宜細落李花那可數偶行芳草步因遲徐自注云王荆公莫年絶句之妙傳天下云細數落花因坐久緩尋芳草得歸遲老夫此詩偶似之耶善作詩者自可辨予謂師川雖欲規倣荆公終竟不及識者當自知之陸放翁不如茅屋底四章其一鑄印大如斗佩劒長拄頤不如茅屋底睡到日髙時其二南伐踰銅柱西征出玉關不如茅屋底髙枕看青山其三火齊堆盤起珊瑚列庫藏不如茅屋底父子自耕桑其四列鼎賔筵盛籠坊從騎都不如茅屋底醉倒喚人扶此公晚年于丘壑遊戲翰墨之作髙蹈之風尚可想見赬桐花前輩少詠竹溪雷公孝友常賦云粲粲朱英葉似桐熏風披拂到西風迎秋送夏甞相見誰道花無十日紅器業逺大於此見矣錢塘下天竺寺石門澗中有卧龍石慈雲法師有詩云梅有和羮日龍無為雨心以其石罅生梅也南康人家有亭占山水之勝取山谷詩以天開圖畫名扁有詠者云須知造化安排巧不費丹青㸃畫工隠然意在浙僧融公好為詩有警句如云試茗知泉味看花省藥名御愛梅云調鼎和羮知有在聖輿不為暗香來僧中傳誦此梅葢曽經車駕賞幸故云武允蹈字徳由髙安人連蹇場屋刻意於詩日煅月煉時出新句如露萱酣宿蝶風朩撼鳴鳩屋頭風過雁燈背月移窓霜林五色錦煙渡一縈絲午簟展風供睡課夜窓扃雨了詩逋眼昏書字不著紙耳重聽言甞問人皆警䇿可味雷竹溪序之居鄉如處子居官如戰士處子甞畏人戰士惟有死兒曹書諸紳勿謂平平耳此白石黄岩老詩可謂至言唐人韋鵬翼絶句豈有閒尋三徑竹却嫌絲管好蛙聲自從煑鶴燒琴後背却青山卧月明所謂殺風景之甚者曾文清公云山谷以竹夫人為青奴余亦名脚婆為錫奴戲作絶句云露帳桃笙晝寢餘此君那可一朝無秋來冷落同班扇嵗晚温柔是錫奴海昌真如寺般若臺張横浦名之臺上有郭熙畫山水焉有井曰靈泉公有詩云髙僧超物外有戸晝甞扃海濶知天大泉甘識地靈一簾春月靜半㸃越山青便作歸歟興移文休勒銘宗人紫芝贈李道士云教人知遁甲喚客問勾庚前人所未對亦警句也栢生如拳栁如把同時移根種庭下栢生未活栁巳榮春風飛飛意艷冶青條眼看十餘尺疎隂朦朧反藏栢栢低若羞不自奮旁人來觀為栢惜飛霜漸久時籥遷秀色不復如舊年折榦枯條委爨下栢生無礙自㕘天此云是先生劉敞所賦種栢之詩詞近㫖逺真有味之言黄山谷治平三年赴鄉舉詩以野無遺賢命題主文衡者廬陵李詢讀詩中兩句云渭水空藏月傅岩深鎖煙擊節稱賞以為此人異日當以詩名擅四海遂膺首選持衡留藻鑑李公之謂乎張文潛讀中興頌云萬里君王蜀中老許表民虞美人草行玉帳佳人坐中老二句之工在一老字耳白樂天詩云倦倚綉牀愁不動緩垂緑帶鬢鬟低遼陽春盡無消息夜合花前日又西好事者畫之為倦綉圖詩中用意以倒翻古人公案為竒陸放翁尤多此格如云君看赤壁終陳跡生子何須似仲謀太平事業人皆見不計封倫死與生少游細看猶多事何用人間下澤車絶句云觀雪剡溪天下勝題詩甞恨不能竒未應便許微之語此興何年有盡時杜詩漆有用而割膏以明自煎黄山谷云龜以靈故焦雉以文自殪葢取漢書兩龔傳薰以香自燒膏以明自消之語山谷云石吾自愛之莫遣牛礪角牛礪角尚可牛鬬殘我竹語甚崛竒李太白獨漉篇云獨漉水中泥水濁不見月不見月尚可水深行人沒山谷句法抑恐有取於此杜牧之云此信的應中路得亂山何處拆書看予甞如京中途得家問時立馬亂山間方思是句之為工吳仲權鎰絶句云子猷君竹竹卿卿車騎幕中塵不清不是淵明真愛菊菊花冷淡似淵明張于湖極稱之㕘政任公希夷賦雪有云人間草朩皆瑶樹天下樓臺盡玉壺雖非禁物體然甚有凌雲氣裘元量初筮樂平印曹與野處洪公詩篇往來公每稱許元量甞有雲歸青嶂雨初歇花卧碧苔春巳休之句公尤降服誠齋為江東常平使者行部境内一客獻詩誠齋極喜詩云江東使者行部時信船一隻櫓兩枝不知夜來春雨過繫在誰家門外籬我欲從人問消息個様船多無處覔就中一事最堪稱隔船聽得讀書聲詩有以法家語為對如東坡云避謗詩尋醫畏病酒入務先子亦有云架閣酒無價編修詩未工陸放翁小築云雖然隠士子午谷寧愧詩人丁夘橋對偶極清切杜少陵贈元逸人歌云故人今居子午谷獨在隂崖結茅屋王莽傳莽以皇后有子孫瑞通子午谷道從杜陵直絶南山徑漢中師古曰今京城直南山有谷通梁漢道名子午谷唐許渾有丁夘橋集丁夘乃潤州城南橋名渾居橋北謂之丁夘庄故基尚在劉槩青州人富韓公守青時遇之甚厚吟詩有云西軒忽見好溪山一丈閒愁減三尺之句為人所傳陸放翁得趙若川書云儲淚一升悲世事減愁三尺看君書疑用前語東風料峭作春寒吹盡汀花客未還白水渡頭煙雨暗竹林猶隔嶺南山此詩僧自益絶句題於長樂縣秀峯寺壁間姚令威賡其韻云隂隂石壁暮生寒底事詩人去未還海濶雲深無處問子規啼斷月中山清源石賡字聲叔能詩有云山盡疑無路雞鳴却有村荆公稱奬之用為法寺數年得監司徐淵子似道寓泰和日甞謁誠齋贄以詩云昨日離山谷今朝謁子雲煙霞俱獻狀草朩亦能文投刺真成贅哦詩不當芹匆匆拜牀下此意欠三薰公即席和云夜對三更月朝揮五朶雲葛藤前輩話衣鉢古人文濁酒唯山果藜羮趁水芹看承無一物清絶炷爐熏今誠齋集亦遺此詩晚唐詩人最盛其集遺逸者尤多御史黄淊推官李咸用皆晚唐詩人而集不顯誠齋甞得其本序之黄淊聞新雁云一聲初觸夢半白巳侵頭餘燈依石壁片月下滄洲遊東林寺云寺寒三伏雨松偃六朝枝上李補闕云諫草封山藥朝衣施衲僧退居云青山寒帶雨古朩夜啼猿李咸用如見後尤無語别來常獨愁孤城三面水古朩一邊春月明千嶠雪灘急五更風燈殘偏有焰雪甚却無聲雲藏山色晴還媚風約溪聲靜又迴未醉已知醒後憶欲開先為落時愁皆誠齋集中所摘佳句黄亞父黄山谷之父所居脩水上其旁東山寺公有絶句題石云竹風松月牢於鎖關閉人心物外情燕雀聞經俱已慣歸來不怕讀書聲誠齋云年少作千餘篇至紹興壬午皆焚之大槩江西體今所存江湖集者葢學后山半山及唐人也甞舉似舊詩數篇於尤延之露窠蛛䘏緯風語燕懐春立岸風大壯還舟燈小明疎星煜煜沙穿石緑雲擾擾水浮苔坐忘日月三杯酒卧䕶江湖一釣船延之慨然曰焚之可惜予亦無甚悔也韓愈和裴晉公詩曰旗穿曉日雲霞雜山倚秋空劒㦸明洪慶善云一士人謂以我之旗況彼雲霞以彼之山況我劒㦸詩家謂回鸞舞鳳格按古樂府有雲屯兩陣合劒聚七星明謂雲不對星而對劒劒不對陣而對雲謂之互對牡丹篇詠至唐人始盛如李正封羅鄴之句尤膾炙人口白樂天有映葉多情隠羞面含叢無力倚新粧却掃編云陳㕘政去非學詩於崔徳符甞請問作詩之要崔曰凡作詩工拙難悉論大要去俗而巳天下書不可不讀然不可有意於用事去非亦常語人言本朝之詩有慎不可讀者有不可不讀者慎不可讀者梅聖俞不可不讀者陳無已也白樂天云周公恐懼流言日王莽謙恭未簒時若使當時身便死一生真偽有誰知此詩乃二十八字史論誠齋云或問何謂雙聲叠韻行穿詰曲﨑嶇路又聽軥輈格磔聲上句叠韻下句雙聲也何謂蜂腰鶴膝曰詞源倒流三峽水筆陣獨掃千人軍無邊落木蕭蕭下不盡長江滚滚來前一聨蜂腰後一聨鶴膝零陵一野寺山谷親筆一詩有云春將國艶薰花骨日借黄金鏤水紋將借二字甚工誠齋詠木犀亦云天將秋氣蒸寒馥月借金波滴小黄山谷狀二字誠齋狀一字尤得奪胎法諫議宋文淵齊愈宮詞云禁城春水碧溶溶流出桃花萬片紅葉上細看無一字始知無女怨春風較唐人所作又出一頭地蘇潁濵云李太白詩過人其平生所享如浮花浪蕋其詩云羅幃巻舒似有人開明月直入無心可猜不可及真西山嘉定間以論邊事與時相不合出知泉南家仲本横餞以古風云班行朝遣白羽書江頭夜鳴青竹輿海邊太守歸閩客底事何用驚皇都北門揮掃窓雲霧南國驅馳樹風雨秋深羽扇擲天外水滿桔橰賤如土長淮中斷天悠悠龍卧不起令人愁橐駞滿都塵不休盜賊失喜蒼生憂中興人物自人物黄鵠髙飛白鷗沒萬里相思百里别明年與公共秋月仲本有題釣臺云掉臂辭漢爵公乎豈不情為嫌張禹佞故學伯夷清大節群公倡髙風百世傾阿瞞窺鼎意終老愧先生皆人所膾炙仲本方駸駸要路立朝大節必可觀矣張約齋鎡循王之孫游意風雅與誠齋放翁倡和詩多佳句晚晴云楊花飛盡芰荷香蠶事方休乳燕忙天色賺人無處㑹曉晴晝雨晚斜陽又云遊人何處是生涯醉倒乘風卧酒家滿面落花敲不醒夢魂荒忽入南華題六合寺云古刹藏幽勝深林一徑寛樓髙鐘韻逺竹宻月隂寒花認香邊折山宜雨後看耽詩眠不得清興寄毫端齊人謂相許為掉磬姚令威次許志仁韻云詩社得公能掉磬牆東知有隠君翁豫章李公大異持節日過山谷墓賦二詩云曾從史館侍虚皇千載文章日月光今日青青原上草依稀猶帶六經香百年文物豫章公喬木隂隂祇晚風楚些屢吟招不得紫雲扶上玉樓中傅自得云予甞以作詩之要叩韋齋先生朱公松時積雨初霽西風凄然公因舉簡齋開門知有雨老樹半身濕又韋蘇州為諸生時列坐共愛風滿林之句且言古之詩人貴衝口直到葢與陶彭澤採菊東籬下悠然見南山同一關捩三人者出處窮達雖不同誦此句則可見其人之蕭散清逸予時心開神㑹始知為詩之趣傅作韋齋集序遂述其語常徳冦公泉葢公南遷時過之題曰冦平仲酌泉煮茗回望北闕黯然而行張南軒觀之曰冦公不忘君丁公為已而已因題詩云酌泉清爽涼如在拜佛低頭有厚顔用舍可知當日事忠邪難掩片言間西溪姚令威寛博物洽聞尤工於詩集中多警句春莫云淡香花濕雨薄影絮行風用昌黎雪詩舞鏡鸞窺沼行天馬度橋懐歸云客心春鴈急詩思暮江寛夜雨云春潮生蛤暈夜雨長蝸涎遣懐云日晚燕爭戸風飄香入簾惜春絶句云遊絲繫日春無迹飛絮穿簾雪不寒惟有閒雲輕映日留隂特地惜花殘皆前人所未道也豫章掲純雄登進士第未唱名而卒樞宻使劉仲洪弔之以詩云黄金榜在人何在白玉樓成記未成竹坡黄伯庸疇老老翁謡云白頭老翁髪埀領牽孫與客摩孫頂翁年八十死無䘏憐汝孩童困饑饉去年雖旱猶半熟今年飛霜先殺菽去年雖饑猶一粥今年甕盎無餘粟客謝主人將孫去淚下如縻不能語伶仃老病惟一身獨卧茅簷夜深雨夢回猶自誤呼孫縣吏催租政打門深得諷刺之體因録之娛書堂詩話
